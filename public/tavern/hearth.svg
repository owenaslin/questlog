<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 56" shape-rendering="crispEdges">
  <!-- Stone surround sides -->
  <rect x="0"  y="0"  width="10" height="56" fill="#566c86"/>
  <rect x="54" y="0"  width="10" height="56" fill="#566c86"/>
  <!-- Stone detail left -->
  <rect x="0"  y="0"  width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="8"  width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="16" width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="24" width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="32" width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="40" width="10" height="4"  fill="#94b0c2"/>
  <rect x="0"  y="48" width="10" height="4"  fill="#94b0c2"/>
  <!-- Stone detail right -->
  <rect x="54" y="4"  width="10" height="4"  fill="#94b0c2"/>
  <rect x="54" y="12" width="10" height="4"  fill="#94b0c2"/>
  <rect x="54" y="20" width="10" height="4"  fill="#94b0c2"/>
  <rect x="54" y="28" width="10" height="4"  fill="#94b0c2"/>
  <rect x="54" y="36" width="10" height="4"  fill="#94b0c2"/>
  <rect x="54" y="44" width="10" height="4"  fill="#94b0c2"/>
  <!-- Mantle top -->
  <rect x="0"  y="0"  width="64" height="8"  fill="#94b0c2"/>
  <rect x="2"  y="2"  width="60" height="2"  fill="#b8cad4"/>
  <rect x="0"  y="6"  width="64" height="2"  fill="#566c86"/>
  <!-- Arch opening top -->
  <rect x="10" y="8"  width="44" height="6"  fill="#1a1510"/>
  <rect x="8"  y="10" width="48" height="4"  fill="#1a1510"/>
  <rect x="10" y="8"  width="2"  height="2"  fill="#333c57"/>
  <rect x="52" y="8"  width="2"  height="2"  fill="#333c57"/>
  <!-- Firebox opening -->
  <rect x="10" y="14" width="44" height="36" fill="#1a1510"/>
  <!-- Back wall glow gradient (warm) -->
  <rect x="14" y="18" width="36" height="28" fill="#2a1a10"/>
  <rect x="18" y="22" width="28" height="20" fill="#3a2010"/>
  <!-- Floor/ash -->
  <rect x="10" y="46" width="44" height="4"  fill="#2e2518"/>
  <!-- Logs -->
  <rect x="14" y="42" width="36" height="5"  fill="#5c3a1a"/>
  <rect x="16" y="41" width="8"  height="4"  fill="#8b5a2b"/>
  <rect x="26" y="40" width="10" height="4"  fill="#7a4e24"/>
  <rect x="38" y="41" width="8"  height="4"  fill="#8b5a2b"/>
  <!-- Log ends -->
  <rect x="14" y="42" width="3"  height="5"  fill="#3d2510"/>
  <rect x="47" y="42" width="3"  height="5"  fill="#3d2510"/>
  <!-- Fire — base layer (red) -->
  <rect x="16" y="30" width="6"  height="12" fill="#c44a36"/>
  <rect x="22" y="28" width="8"  height="14" fill="#b13e53"/>
  <rect x="30" y="26" width="8"  height="16" fill="#c44a36"/>
  <rect x="38" y="29" width="6"  height="13" fill="#b13e53"/>
  <rect x="42" y="32" width="4"  height="10" fill="#c44a36"/>
  <!-- Fire — mid layer (orange) -->
  <rect x="18" y="24" width="6"  height="12" fill="#ef7d57"/>
  <rect x="24" y="22" width="8"  height="12" fill="#ef7d57"/>
  <rect x="32" y="20" width="8"  height="14" fill="#ef7d57"/>
  <rect x="38" y="23" width="6"  height="12" fill="#ef7d57"/>
  <rect x="42" y="26" width="4"  height="10" fill="#ef7d57"/>
  <!-- Fire — top layer (yellow/white) -->
  <rect x="22" y="16" width="4"  height="10" fill="#ffcd75"/>
  <rect x="26" y="14" width="6"  height="10" fill="#ffcd75"/>
  <rect x="32" y="12" width="6"  height="10" fill="#ffcd75"/>
  <rect x="38" y="15" width="4"  height="8"  fill="#ffcd75"/>
  <!-- Flame tips -->
  <rect x="26" y="12" width="4"  height="4"  fill="#f5d76e"/>
  <rect x="30" y="10" width="4"  height="4"  fill="#f5d76e"/>
  <rect x="34" y="12" width="4"  height="4"  fill="#f5d76e"/>
  <!-- Embers on floor -->
  <rect x="16" y="45" width="2"  height="2"  fill="#ef7d57"/>
  <rect x="22" y="46" width="2"  height="1"  fill="#c44a36"/>
  <rect x="30" y="45" width="2"  height="2"  fill="#ef7d57"/>
  <rect x="38" y="46" width="2"  height="1"  fill="#c44a36"/>
  <rect x="44" y="45" width="2"  height="2"  fill="#ef7d57"/>
  <!-- Glow halo on stone sides -->
  <rect x="8"  y="14" width="2"  height="30" fill="#3a2010" opacity="0.7"/>
  <rect x="54" y="14" width="2"  height="30" fill="#3a2010" opacity="0.7"/>
</svg>
