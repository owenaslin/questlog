<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" shape-rendering="crispEdges">
  <!-- Chest base body -->
  <rect x="2"  y="24" width="60" height="22" fill="#8b5a2b"/>
  <!-- Base shadow bottom -->
  <rect x="2"  y="44" width="60" height="4"  fill="#5c3a1a"/>
  <!-- Base shadow right -->
  <rect x="58" y="24" width="4"  height="22" fill="#5c3a1a"/>
  <!-- Base wood grain -->
  <rect x="2"  y="30" width="56" height="2"  fill="#7a4e24" opacity="0.6"/>
  <rect x="2"  y="38" width="56" height="2"  fill="#7a4e24" opacity="0.6"/>
  <!-- Base highlight top -->
  <rect x="2"  y="24" width="56" height="2"  fill="#a06835"/>
  <!-- Metal band base -->
  <rect x="2"  y="28" width="60" height="4"  fill="#566c86"/>
  <rect x="4"  y="29" width="56" height="2"  fill="#94b0c2"/>
  <rect x="2"  y="40" width="60" height="4"  fill="#566c86"/>
  <rect x="4"  y="41" width="56" height="2"  fill="#94b0c2"/>
  <!-- Lid -->
  <rect x="2"  y="8"  width="60" height="18" fill="#8b5a2b"/>
  <!-- Lid top highlight -->
  <rect x="2"  y="8"  width="60" height="3"  fill="#a06835"/>
  <!-- Lid right shadow -->
  <rect x="58" y="8"  width="4"  height="18" fill="#5c3a1a"/>
  <!-- Lid wood grain -->
  <rect x="2"  y="14" width="56" height="2"  fill="#7a4e24" opacity="0.6"/>
  <rect x="2"  y="20" width="56" height="2"  fill="#7a4e24" opacity="0.6"/>
  <!-- Lid metal band -->
  <rect x="2"  y="10" width="60" height="3"  fill="#566c86"/>
  <rect x="4"  y="11" width="56" height="1"  fill="#94b0c2"/>
  <rect x="2"  y="20" width="60" height="3"  fill="#566c86"/>
  <rect x="4"  y="21" width="56" height="1"  fill="#94b0c2"/>
  <!-- Hasp / lock center -->
  <rect x="28" y="20" width="8"  height="8"  fill="#566c86"/>
  <rect x="29" y="21" width="6"  height="6"  fill="#94b0c2"/>
  <rect x="30" y="22" width="4"  height="4"  fill="#566c86"/>
  <!-- Lock loop -->
  <rect x="29" y="17" width="6"  height="5"  fill="#94b0c2"/>
  <rect x="30" y="16" width="4"  height="4"  fill="#566c86"/>
  <rect x="31" y="15" width="2"  height="3"  fill="#94b0c2"/>
  <!-- Corner studs base -->
  <rect x="2"  y="24" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="3"  y="25" width="2"  height="2"  fill="#566c86"/>
  <rect x="58" y="24" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="59" y="25" width="2"  height="2"  fill="#566c86"/>
  <rect x="2"  y="42" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="3"  y="43" width="2"  height="2"  fill="#566c86"/>
  <rect x="58" y="42" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="59" y="43" width="2"  height="2"  fill="#566c86"/>
  <!-- Corner studs lid -->
  <rect x="2"  y="8"  width="4"  height="4"  fill="#94b0c2"/>
  <rect x="3"  y="9"  width="2"  height="2"  fill="#566c86"/>
  <rect x="58" y="8"  width="4"  height="4"  fill="#94b0c2"/>
  <rect x="59" y="9"  width="2"  height="2"  fill="#566c86"/>
  <!-- Gold coins peeking (open state hint) -->
  <rect x="14" y="6"  width="6"  height="4"  fill="#e8b864"/>
  <rect x="22" y="4"  width="8"  height="5"  fill="#ffcd75"/>
  <rect x="32" y="5"  width="6"  height="4"  fill="#e8b864"/>
  <rect x="40" y="3"  width="8"  height="5"  fill="#ffcd75"/>
  <rect x="50" y="6"  width="6"  height="4"  fill="#e8b864"/>
  <!-- Gold coin shine -->
  <rect x="23" y="4"  width="2"  height="1"  fill="#f5d76e"/>
  <rect x="41" y="3"  width="2"  height="1"  fill="#f5d76e"/>
</svg>
