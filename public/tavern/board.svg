<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" shape-rendering="crispEdges">
  <!-- Post left -->
  <rect x="3" y="0" width="4" height="32" fill="#5c3a1a"/>
  <!-- Post right -->
  <rect x="33" y="0" width="4" height="32" fill="#5c3a1a"/>
  <!-- Board -->
  <rect x="2" y="4" width="36" height="24" fill="#8b5a2b"/>
  <!-- Wood grain -->
  <rect x="2" y="8" width="36" height="1" fill="#7a4e24" opacity="0.5"/>
  <rect x="2" y="16" width="36" height="1" fill="#7a4e24" opacity="0.5"/>
  <rect x="2" y="24" width="36" height="1" fill="#7a4e24" opacity="0.5"/>
  <!-- Board border -->
  <rect x="2" y="4" width="36" height="2" fill="#c4a85a"/>
  <rect x="2" y="26" width="36" height="2" fill="#5c3a1a"/>
  <!-- Notice pinned -->
  <rect x="8" y="8" width="24" height="16" fill="#e8d4a0"/>
  <rect x="8" y="8" width="24" height="1" fill="#c4a85a"/>
  <!-- Pin -->
  <rect x="19" y="6" width="2" height="4" fill="#c44a36"/>
  <!-- Notice lines -->
  <rect x="11" y="11" width="18" height="1" fill="#8b5a2b"/>
  <rect x="11" y="14" width="14" height="1" fill="#8b5a2b"/>
  <rect x="11" y="17" width="16" height="1" fill="#8b5a2b"/>
  <rect x="11" y="20" width="10" height="1" fill="#8b5a2b"/>
</svg>
