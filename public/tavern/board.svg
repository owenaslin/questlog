<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" shape-rendering="crispEdges">
  <!-- Post left -->
  <rect x="2"  y="0"  width="6"  height="64" fill="#5c3a1a"/>
  <rect x="3"  y="0"  width="2"  height="64" fill="#7a4e24"/>
  <!-- Post right -->
  <rect x="72" y="0"  width="6"  height="64" fill="#5c3a1a"/>
  <rect x="73" y="0"  width="2"  height="64" fill="#7a4e24"/>
  <!-- Board main body -->
  <rect x="2"  y="8"  width="76" height="48" fill="#8b5a2b"/>
  <!-- Wood grain horizontal lines -->
  <rect x="2"  y="14" width="76" height="2"  fill="#7a4e24" opacity="0.6"/>
  <rect x="2"  y="22" width="76" height="1"  fill="#5c3a1a" opacity="0.5"/>
  <rect x="2"  y="30" width="76" height="2"  fill="#7a4e24" opacity="0.6"/>
  <rect x="2"  y="38" width="76" height="1"  fill="#5c3a1a" opacity="0.5"/>
  <rect x="2"  y="46" width="76" height="2"  fill="#7a4e24" opacity="0.6"/>
  <!-- Knot hole left -->
  <rect x="10" y="36" width="4"  height="3"  fill="#5c3a1a"/>
  <rect x="11" y="37" width="2"  height="2"  fill="#3d2510"/>
  <!-- Knot hole right -->
  <rect x="64" y="22" width="4"  height="3"  fill="#5c3a1a"/>
  <rect x="65" y="23" width="2"  height="2"  fill="#3d2510"/>
  <!-- Board top border (gold trim) -->
  <rect x="2"  y="8"  width="76" height="4"  fill="#c4a85a"/>
  <rect x="4"  y="9"  width="72" height="2"  fill="#e8b864"/>
  <!-- Board bottom shadow -->
  <rect x="2"  y="52" width="76" height="4"  fill="#5c3a1a"/>
  <!-- Nail heads (corners) -->
  <rect x="6"  y="10" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="7"  y="11" width="2"  height="2"  fill="#566c86"/>
  <rect x="70" y="10" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="71" y="11" width="2"  height="2"  fill="#566c86"/>
  <rect x="6"  y="48" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="7"  y="49" width="2"  height="2"  fill="#566c86"/>
  <rect x="70" y="48" width="4"  height="4"  fill="#94b0c2"/>
  <rect x="71" y="49" width="2"  height="2"  fill="#566c86"/>
  <!-- Left notice (parchment) -->
  <rect x="10" y="16" width="26" height="32" fill="#e8d4a0"/>
  <rect x="10" y="16" width="26" height="2"  fill="#c4a85a"/>
  <rect x="10" y="46" width="26" height="2"  fill="#c4a85a"/>
  <!-- Left notice text lines -->
  <rect x="13" y="21" width="20" height="2"  fill="#8b5a2b"/>
  <rect x="13" y="26" width="16" height="2"  fill="#8b5a2b"/>
  <rect x="13" y="31" width="18" height="2"  fill="#8b5a2b"/>
  <rect x="13" y="36" width="12" height="2"  fill="#8b5a2b"/>
  <rect x="13" y="41" width="14" height="2"  fill="#8b5a2b"/>
  <!-- Left pin -->
  <rect x="22" y="13" width="4"  height="6"  fill="#c44a36"/>
  <rect x="23" y="14" width="2"  height="4"  fill="#ef7d57"/>
  <!-- Right notice (parchment, slightly tilted look via offset) -->
  <rect x="44" y="18" width="26" height="28" fill="#dcc898"/>
  <rect x="44" y="18" width="26" height="2"  fill="#b8a060"/>
  <rect x="44" y="44" width="26" height="2"  fill="#b8a060"/>
  <!-- Right notice text lines -->
  <rect x="47" y="23" width="18" height="2"  fill="#7a5020"/>
  <rect x="47" y="28" width="14" height="2"  fill="#7a5020"/>
  <rect x="47" y="33" width="16" height="2"  fill="#7a5020"/>
  <rect x="47" y="38" width="10" height="2"  fill="#7a5020"/>
  <!-- Right pin -->
  <rect x="55" y="15" width="4"  height="6"  fill="#b13e53"/>
  <rect x="56" y="16" width="2"  height="4"  fill="#c44a36"/>
  <!-- Torn corner on right notice -->
  <rect x="66" y="18" width="4"  height="4"  fill="#8b5a2b"/>
  <rect x="68" y="18" width="2"  height="2"  fill="#7a4e24"/>
  <!-- "QUEST BOARD" label at top -->
  <rect x="28" y="10" width="4"  height="2"  fill="#e8b864" opacity="0.8"/>
  <rect x="34" y="10" width="4"  height="2"  fill="#e8b864" opacity="0.8"/>
  <rect x="40" y="10" width="4"  height="2"  fill="#e8b864" opacity="0.8"/>
  <rect x="46" y="10" width="4"  height="2"  fill="#e8b864" opacity="0.8"/>
</svg>
