<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 56" shape-rendering="crispEdges">
  <!-- Foam overflow blobs -->
  <rect x="4"  y="4"  width="6"  height="6"  fill="#f4f4f4"/>
  <rect x="2"  y="6"  width="8"  height="5"  fill="#f4f4f4"/>
  <rect x="10" y="2"  width="8"  height="8"  fill="#f4f4f4"/>
  <rect x="8"  y="3"  width="10" height="6"  fill="#f4f4f4"/>
  <rect x="18" y="0"  width="8"  height="9"  fill="#f4f4f4"/>
  <rect x="16" y="2"  width="10" height="6"  fill="#f4f4f4"/>
  <rect x="26" y="2"  width="8"  height="8"  fill="#f4f4f4"/>
  <rect x="24" y="3"  width="10" height="6"  fill="#f4f4f4"/>
  <rect x="34" y="4"  width="6"  height="6"  fill="#f4f4f4"/>
  <rect x="32" y="5"  width="8"  height="5"  fill="#f4f4f4"/>
  <!-- Foam shadow -->
  <rect x="4"  y="9"  width="36" height="2"  fill="#dce8e8" opacity="0.6"/>
  <!-- Mug outer body -->
  <rect x="2"  y="10" width="36" height="38" fill="#c4a85a"/>
  <!-- Right shadow -->
  <rect x="34" y="10" width="4"  height="38" fill="#a08030"/>
  <!-- Bottom shadow -->
  <rect x="2"  y="44" width="36" height="4"  fill="#a08030"/>
  <!-- Mug inner face -->
  <rect x="4"  y="11" width="30" height="32" fill="#e8b864"/>
  <!-- Beer liquid (golden) -->
  <rect x="4"  y="18" width="30" height="25" fill="#c49a3c"/>
  <!-- Beer highlight -->
  <rect x="4"  y="18" width="30" height="3"  fill="#e8b864"/>
  <!-- Bubbles -->
  <rect x="8"  y="26" width="4"  height="4"  fill="#e8b864" opacity="0.7"/>
  <rect x="18" y="22" width="4"  height="4"  fill="#e8b864" opacity="0.7"/>
  <rect x="26" y="28" width="2"  height="2"  fill="#e8b864" opacity="0.7"/>
  <rect x="12" y="32" width="2"  height="2"  fill="#e8b864" opacity="0.5"/>
  <!-- Mug shine -->
  <rect x="6"  y="12" width="4"  height="14" fill="#f5d76e" opacity="0.5"/>
  <rect x="7"  y="11" width="2"  height="2"  fill="#f5d76e" opacity="0.7"/>
  <!-- Mug base -->
  <rect x="0"  y="46" width="40" height="10" fill="#a08030"/>
  <rect x="2"  y="47" width="36" height="8"  fill="#c4a85a"/>
  <rect x="4"  y="48" width="32" height="6"  fill="#e8b864"/>
  <!-- Handle outer -->
  <rect x="36" y="14" width="10" height="4"  fill="#c4a85a"/>
  <rect x="44" y="18" width="6"  height="14" fill="#c4a85a"/>
  <rect x="36" y="32" width="10" height="4"  fill="#c4a85a"/>
  <!-- Handle inner (shadow) -->
  <rect x="38" y="16" width="6"  height="2"  fill="#a08030"/>
  <rect x="46" y="20" width="2"  height="10" fill="#a08030"/>
  <rect x="38" y="34" width="6"  height="2"  fill="#a08030"/>
  <!-- Handle inner hole -->
  <rect x="38" y="20" width="6"  height="12" fill="#1a1510"/>
  <!-- Foam on top -->
  <rect x="4"  y="10" width="30" height="2"  fill="#f4f4f4"/>
</svg>
