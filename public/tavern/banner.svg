<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 80" shape-rendering="crispEdges">
  <!-- Hanging rod -->
  <rect x="0"  y="0"  width="48" height="4"  fill="#8b5a2b"/>
  <rect x="0"  y="1"  width="48" height="2"  fill="#a06835"/>
  <!-- Rod end caps -->
  <rect x="0"  y="0"  width="6"  height="6"  fill="#c4a85a"/>
  <rect x="1"  y="1"  width="4"  height="4"  fill="#e8b864"/>
  <rect x="42" y="0"  width="6"  height="6"  fill="#c4a85a"/>
  <rect x="43" y="1"  width="4"  height="4"  fill="#e8b864"/>
  <!-- Banner body -->
  <rect x="4"  y="4"  width="40" height="52" fill="#5d275d"/>
  <!-- Banner border (gold) -->
  <rect x="4"  y="4"  width="40" height="3"  fill="#e8b864"/>
  <rect x="4"  y="4"  width="3"  height="52" fill="#e8b864"/>
  <rect x="41" y="4"  width="3"  height="52" fill="#e8b864"/>
  <rect x="4"  y="53" width="40" height="3"  fill="#e8b864"/>
  <!-- Inner border line -->
  <rect x="8"  y="8"  width="32" height="1"  fill="#c49a3c"/>
  <rect x="8"  y="8"  width="1"  height="44" fill="#c49a3c"/>
  <rect x="39" y="8"  width="1"  height="44" fill="#c49a3c"/>
  <rect x="8"  y="51" width="32" height="1"  fill="#c49a3c"/>
  <!-- Sword vertical -->
  <rect x="23" y="10" width="2"  height="32" fill="#e8b864"/>
  <!-- Sword crossguard -->
  <rect x="17" y="22" width="14" height="4"  fill="#e8b864"/>
  <rect x="16" y="23" width="16" height="2"  fill="#c49a3c"/>
  <!-- Sword pommel -->
  <rect x="21" y="40" width="6"  height="4"  fill="#c49a3c"/>
  <rect x="22" y="41" width="4"  height="2"  fill="#e8b864"/>
  <!-- Sword blade highlight -->
  <rect x="24" y="10" width="1"  height="22" fill="#f5d76e"/>
  <!-- Stars flanking sword -->
  <rect x="11" y="12" width="4"  height="4"  fill="#c49a3c"/>
  <rect x="12" y="11" width="2"  height="6"  fill="#c49a3c"/>
  <rect x="33" y="12" width="4"  height="4"  fill="#c49a3c"/>
  <rect x="34" y="11" width="2"  height="6"  fill="#c49a3c"/>
  <!-- Bottom stars -->
  <rect x="11" y="44" width="4"  height="4"  fill="#c49a3c"/>
  <rect x="12" y="43" width="2"  height="6"  fill="#c49a3c"/>
  <rect x="33" y="44" width="4"  height="4"  fill="#c49a3c"/>
  <rect x="34" y="43" width="2"  height="6"  fill="#c49a3c"/>
  <!-- Fringe tassels -->
  <rect x="4"  y="56" width="4"  height="10" fill="#e8b864"/>
  <rect x="5"  y="65" width="2"  height="4"  fill="#c49a3c"/>
  <rect x="10" y="56" width="4"  height="12" fill="#c44a36"/>
  <rect x="11" y="67" width="2"  height="4"  fill="#8b2a1a"/>
  <rect x="16" y="56" width="4"  height="10" fill="#e8b864"/>
  <rect x="17" y="65" width="2"  height="4"  fill="#c49a3c"/>
  <rect x="22" y="56" width="4"  height="13" fill="#c44a36"/>
  <rect x="23" y="68" width="2"  height="4"  fill="#8b2a1a"/>
  <rect x="28" y="56" width="4"  height="10" fill="#e8b864"/>
  <rect x="29" y="65" width="2"  height="4"  fill="#c49a3c"/>
  <rect x="34" y="56" width="4"  height="12" fill="#c44a36"/>
  <rect x="35" y="67" width="2"  height="4"  fill="#8b2a1a"/>
  <rect x="40" y="56" width="4"  height="10" fill="#e8b864"/>
  <rect x="41" y="65" width="2"  height="4"  fill="#c49a3c"/>
</svg>
