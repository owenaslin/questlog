<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" shape-rendering="crispEdges">
  <!-- Top roller shadow -->
  <rect x="2"  y="2"  width="44" height="8"  fill="#5c3a1a"/>
  <!-- Top roller -->
  <rect x="0"  y="0"  width="48" height="8"  fill="#8b5a2b"/>
  <rect x="2"  y="1"  width="44" height="2"  fill="#c4a85a"/>
  <rect x="2"  y="3"  width="44" height="2"  fill="#a06835"/>
  <!-- Roller end caps -->
  <rect x="0"  y="0"  width="6"  height="8"  fill="#5c3a1a"/>
  <rect x="1"  y="1"  width="4"  height="6"  fill="#7a4e24"/>
  <rect x="42" y="0"  width="6"  height="8"  fill="#5c3a1a"/>
  <rect x="43" y="1"  width="4"  height="6"  fill="#7a4e24"/>
  <!-- Scroll body -->
  <rect x="4"  y="8"  width="40" height="24" fill="#e8d4a0"/>
  <!-- Left edge shadow -->
  <rect x="4"  y="8"  width="3"  height="24" fill="#c4a85a"/>
  <!-- Right edge shadow -->
  <rect x="41" y="8"  width="3"  height="24" fill="#c4a85a"/>
  <!-- Parchment texture (horizontal lines) -->
  <rect x="7"  y="10" width="34" height="1"  fill="#dcc898" opacity="0.5"/>
  <rect x="7"  y="14" width="34" height="1"  fill="#dcc898" opacity="0.5"/>
  <rect x="7"  y="18" width="34" height="1"  fill="#dcc898" opacity="0.5"/>
  <rect x="7"  y="22" width="34" height="1"  fill="#dcc898" opacity="0.5"/>
  <rect x="7"  y="26" width="34" height="1"  fill="#dcc898" opacity="0.5"/>
  <!-- Text lines -->
  <rect x="10" y="11" width="28" height="2"  fill="#8b5a2b"/>
  <rect x="10" y="15" width="22" height="2"  fill="#8b5a2b"/>
  <rect x="10" y="19" width="26" height="2"  fill="#8b5a2b"/>
  <rect x="10" y="23" width="18" height="2"  fill="#8b5a2b"/>
  <rect x="10" y="27" width="20" height="2"  fill="#8b5a2b"/>
  <!-- Seal / ribbon center -->
  <rect x="20" y="14" width="8"  height="12" fill="#c44a36"/>
  <rect x="18" y="16" width="12" height="8"  fill="#c44a36"/>
  <rect x="21" y="13" width="6"  height="14" fill="#c44a36"/>
  <!-- Wax seal -->
  <rect x="20" y="16" width="8"  height="8"  fill="#8b2a1a"/>
  <rect x="21" y="17" width="6"  height="6"  fill="#b13e53"/>
  <!-- Seal stamp (star) -->
  <rect x="23" y="18" width="2"  height="4"  fill="#e8b864"/>
  <rect x="22" y="19" width="4"  height="2"  fill="#e8b864"/>
  <!-- Bottom roller -->
  <rect x="2"  y="32" width="44" height="8"  fill="#5c3a1a"/>
  <rect x="0"  y="32" width="48" height="8"  fill="#8b5a2b"/>
  <rect x="2"  y="33" width="44" height="2"  fill="#c4a85a"/>
  <rect x="2"  y="35" width="44" height="2"  fill="#a06835"/>
  <!-- Bottom roller end caps -->
  <rect x="0"  y="32" width="6"  height="8"  fill="#5c3a1a"/>
  <rect x="1"  y="33" width="4"  height="6"  fill="#7a4e24"/>
  <rect x="42" y="32" width="6"  height="8"  fill="#5c3a1a"/>
  <rect x="43" y="33" width="4"  height="6"  fill="#7a4e24"/>
</svg>
