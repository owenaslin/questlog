<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" shape-rendering="crispEdges">
  <!-- Body -->
  <rect x="16" y="10" width="18" height="16" fill="#1a1c2c"/>
  <rect x="14" y="12" width="22" height="12" fill="#1a1c2c"/>
  <rect x="12" y="14" width="26" height="8"  fill="#1a1c2c"/>
  <!-- Wing left (spread) -->
  <rect x="0"  y="12" width="16" height="10" fill="#1a1c2c"/>
  <rect x="0"  y="14" width="14" height="6"  fill="#333c57"/>
  <rect x="0"  y="16" width="12" height="4"  fill="#1a1c2c"/>
  <!-- Wing left feathers -->
  <rect x="0"  y="20" width="4"  height="4"  fill="#1a1c2c"/>
  <rect x="4"  y="21" width="4"  height="4"  fill="#1a1c2c"/>
  <rect x="8"  y="20" width="4"  height="5"  fill="#1a1c2c"/>
  <rect x="12" y="21" width="4"  height="4"  fill="#1a1c2c"/>
  <!-- Wing right (spread) -->
  <rect x="32" y="12" width="16" height="10" fill="#1a1c2c"/>
  <rect x="34" y="14" width="14" height="6"  fill="#333c57"/>
  <rect x="36" y="16" width="12" height="4"  fill="#1a1c2c"/>
  <!-- Wing right feathers -->
  <rect x="44" y="20" width="4"  height="4"  fill="#1a1c2c"/>
  <rect x="40" y="21" width="4"  height="4"  fill="#1a1c2c"/>
  <rect x="36" y="20" width="4"  height="5"  fill="#1a1c2c"/>
  <rect x="32" y="21" width="4"  height="4"  fill="#1a1c2c"/>
  <!-- Head -->
  <rect x="19" y="4"  width="10" height="10" fill="#1a1c2c"/>
  <rect x="17" y="6"  width="14" height="8"  fill="#1a1c2c"/>
  <!-- Beak -->
  <rect x="28" y="8"  width="8"  height="2"  fill="#566c86"/>
  <rect x="30" y="10" width="6"  height="2"  fill="#566c86"/>
  <rect x="34" y="12" width="2"  height="2"  fill="#566c86"/>
  <!-- Eye -->
  <rect x="24" y="7"  width="4"  height="4"  fill="#41a6f6"/>
  <rect x="25" y="8"  width="2"  height="2"  fill="#f4f4f4"/>
  <rect x="25" y="8"  width="1"  height="1"  fill="#1a1c2c"/>
  <!-- Tail -->
  <rect x="16" y="24" width="4"  height="6"  fill="#1a1c2c"/>
  <rect x="20" y="24" width="4"  height="8"  fill="#1a1c2c"/>
  <rect x="24" y="24" width="4"  height="8"  fill="#1a1c2c"/>
  <rect x="28" y="24" width="4"  height="6"  fill="#1a1c2c"/>
  <!-- Legs / perch -->
  <rect x="19" y="30" width="2"  height="6"  fill="#566c86"/>
  <rect x="27" y="30" width="2"  height="6"  fill="#566c86"/>
  <!-- Talons -->
  <rect x="15" y="34" width="8"  height="2"  fill="#566c86"/>
  <rect x="23" y="34" width="8"  height="2"  fill="#566c86"/>
  <rect x="17" y="36" width="2"  height="2"  fill="#566c86"/>
  <rect x="25" y="36" width="2"  height="2"  fill="#566c86"/>
  <!-- Perch branch -->
  <rect x="4"  y="36" width="40" height="4"  fill="#5c3a1a"/>
  <rect x="4"  y="37" width="40" height="2"  fill="#7a4e24"/>
  <!-- Iridescent sheen (blue-purple highlight on wing) -->
  <rect x="2"  y="14" width="4"  height="4"  fill="#5d275d" opacity="0.5"/>
  <rect x="40" y="14" width="4"  height="4"  fill="#5d275d" opacity="0.5"/>
</svg>
