  <rect x="28" y="40" width="2"  height="30" fill="#5c3a1a"/>
  <rect x="12" y="68" width="18" height="2"  fill="#5c3a1a"/>
  <!-- Lower right panel -->
  <rect x="34" y="40" width="18" height="30" fill="#7a4e24"/>
  <rect x="34" y="40" width="18" height="3"  fill="#c4a85a"/>
  <rect x="34" y="40" width="2"  height="30" fill="#c4a85a"/>
  <rect x="50" y="40" width="2"  height="30" fill="#5c3a1a"/>
  <rect x="34" y="68" width="18" height="2"  fill="#5c3a1a"/>
