  <rect x="36" y="36" width="8"  height="2"  fill="#e8b864"/>
  <rect x="34" y="34" width="4"  height="6"  fill="#e8b864"/>
  <rect x="44" y="34" width="4"  height="6"  fill="#e8b864"/>
  <rect x="34" y="34" width="12" height="2"  fill="#e8b864"/>
  <rect x="34" y="38" width="12" height="2"  fill="#e8b864"/>
  <rect x="36" y="36" width="2"  height="2"  fill="#c49a3c"/>
