  <rect x="0"  y="36" width="8"  height="16" fill="#94b0c2"/>
  <rect x="0"  y="54" width="8"  height="16" fill="#94b0c2"/>
  <rect x="0"  y="72" width="8"  height="8"  fill="#94b0c2"/>
  <!-- Stone block pattern right -->
  <rect x="56" y="4"  width="8"  height="16" fill="#94b0c2"/>
