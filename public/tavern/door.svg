<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 32" shape-rendering="crispEdges">
  <!-- Door frame -->
  <rect x="0" y="0" width="24" height="32" fill="#5c3a1a"/>
  <!-- Door panels -->
  <rect x="2" y="2" width="20" height="28" fill="#8b5a2b"/>
  <!-- Top arch -->
  <rect x="4" y="4" width="16" height="2" fill="#c4a85a"/>
  <rect x="3" y="6" width="18" height="1" fill="#c4a85a"/>
  <!-- Upper panel -->
  <rect x="4" y="7" width="7" height="8" fill="#7a4e24"/>
  <rect x="13" y="7" width="7" height="8" fill="#7a4e24"/>
  <!-- Panel trim -->
  <rect x="4" y="7" width="7" height="1" fill="#c4a85a"/>
  <rect x="13" y="7" width="7" height="1" fill="#c4a85a"/>
  <!-- Lower panel -->
  <rect x="4" y="17" width="7" height="10" fill="#7a4e24"/>
  <rect x="13" y="17" width="7" height="10" fill="#7a4e24"/>
  <!-- Panel trim -->
  <rect x="4" y="17" width="7" height="1" fill="#c4a85a"/>
  <rect x="13" y="17" width="7" height="1" fill="#c4a85a"/>
  <!-- Door knob -->
  <rect x="14" y="15" width="3" height="3" fill="#e8b864"/>
  <rect x="15" y="16" width="1" height="1" fill="#f5d76e"/>
</svg>
