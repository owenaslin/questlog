  <rect x="56" y="38" width="8"  height="2"  fill="#1a1c2c"/>
  <rect x="56" y="56" width="8"  height="2"  fill="#1a1c2c"/>
  <rect x="56" y="74" width="8"  height="2"  fill="#1a1c2c"/>
