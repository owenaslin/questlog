  <rect x="0"  y="0"  width="16" height="8"  fill="#94b0c2"/>
  <rect x="18" y="0"  width="12" height="8"  fill="#94b0c2"/>
  <rect x="32" y="0"  width="12" height="8"  fill="#566c86"/>
