  <rect x="34" y="52" width="12" height="12" fill="#566c86"/>
  <rect x="35" y="53" width="10" height="10" fill="#333c57"/>
  <rect x="37" y="54" width="6"  height="4"  fill="#1a1510"/>
  <rect x="36" y="56" width="8"  height="2"  fill="#1a1510"/>
  <rect x="39" y="58" width="2"  height="4"  fill="#1a1510"/>
  <!-- Step -->
  <rect x="8"  y="76" width="48" height="4"  fill="#566c86"/>
  <rect x="6"  y="78" width="52" height="2"  fill="#94b0c2"/>
