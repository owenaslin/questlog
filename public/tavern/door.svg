  <rect x="9"  y="15" width="6"  height="4"  fill="#566c86"/>
  <rect x="8"  y="52" width="8"  height="6"  fill="#333c57"/>
  <rect x="9"  y="53" width="6"  height="4"  fill="#566c86"/>
