  <rect x="9"  y="15" width="2"  height="2"  fill="#94b0c2"/>
  <rect x="13" y="15" width="2"  height="2"  fill="#94b0c2"/>
  <rect x="9"  y="53" width="2"  height="2"  fill="#94b0c2"/>
  <rect x="13" y="53" width="2"  height="2"  fill="#94b0c2"/>
