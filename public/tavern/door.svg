  <rect x="8"  y="8"  width="4"  height="4"  fill="#566c86"/>
  <rect x="52" y="8"  width="4"  height="4"  fill="#566c86"/>
  <rect x="8"  y="12" width="2"  height="4"  fill="#566c86"/>
  <rect x="54" y="12" width="2"  height="4"  fill="#566c86"/>
