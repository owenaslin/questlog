<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" shape-rendering="crispEdges">
  <!-- Flame outer glow (soft) -->
  <rect x="11" y="2"  width="10" height="2"  fill="#ffcd75" opacity="0.4"/>
  <rect x="10" y="3"  width="12" height="2"  fill="#ffcd75" opacity="0.3"/>
  <!-- Flame tip -->
  <rect x="14" y="0"  width="4"  height="2"  fill="#f5d76e"/>
  <rect x="13" y="1"  width="6"  height="2"  fill="#f5d76e"/>
  <!-- Flame body top -->
  <rect x="12" y="2"  width="8"  height="3"  fill="#f5d76e"/>
  <!-- Flame body mid (orange) -->
  <rect x="11" y="4"  width="10" height="4"  fill="#ef7d57"/>
  <rect x="10" y="6"  width="12" height="3"  fill="#ef7d57"/>
  <!-- Flame base (red) -->
  <rect x="12" y="8"  width="8"  height="3"  fill="#c44a36"/>
  <rect x="13" y="10" width="6"  height="2"  fill="#c44a36"/>
  <!-- Wick -->
  <rect x="14" y="11" width="4"  height="3"  fill="#333c57"/>
  <rect x="15" y="13" width="2"  height="2"  fill="#1a1c2c"/>
  <!-- Candle body -->
  <rect x="11" y="14" width="10" height="22" fill="#e8d4a0"/>
  <!-- Left shadow -->
  <rect x="11" y="14" width="2"  height="22" fill="#c4a85a"/>
  <!-- Right shadow -->
  <rect x="19" y="14" width="2"  height="22" fill="#c4a85a"/>
  <!-- Highlight streak -->
  <rect x="14" y="15" width="2"  height="18" fill="#f0e0b8"/>
  <!-- Wax drip left -->
  <rect x="11" y="22" width="2"  height="5"  fill="#e8d4a0"/>
  <rect x="11" y="26" width="2"  height="3"  fill="#dac898"/>
  <!-- Wax drip right -->
  <rect x="19" y="26" width="2"  height="4"  fill="#e8d4a0"/>
  <!-- Wax drip front -->
  <rect x="15" y="32" width="2"  height="4"  fill="#dac898"/>
  <!-- Melted wax pool top of base -->
  <rect x="10" y="35" width="12" height="2"  fill="#dac898"/>
  <!-- Base plate -->
  <rect x="8"  y="36" width="16" height="6"  fill="#8b5a2b"/>
  <rect x="7"  y="39" width="18" height="3"  fill="#5c3a1a"/>
  <!-- Base highlight -->
  <rect x="9"  y="37" width="14" height="1"  fill="#a06835"/>
  <!-- Wax puddle on base -->
  <rect x="10" y="36" width="12" height="2"  fill="#c4a85a"/>
</svg>
